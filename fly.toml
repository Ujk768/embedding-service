app = 'embedding-service'
primary_region = 'yyz'

[build]

[env]
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 7000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1